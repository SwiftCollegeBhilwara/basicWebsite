<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX Pro - Advanced C++ Cloud IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0e14;
            color: #cdcaa7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Premium Header Styling */
        header {
            background-color: #161b22;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .branding h1 {
            font-size: 1.2rem;
            color: #58a6ff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: #21262d;
            border: 1px solid #388bfd;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #58a6ff;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-run {
            background-color: #238636;
            color: white;
            box-shadow: 0 2px 6px rgba(35, 134, 54, 0.3);
        }

        .btn-run:hover {
            background-color: #2ea043;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 160, 67, 0.4);
        }

        .btn-clear {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .btn-clear:hover {
            background-color: #30363d;
        }

        /* Layout Grid */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        /* Editor Block */
        .editor-container {
            flex: 1.2;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
        }

        .panel-label {
            background-color: #161b22;
            padding: 8px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }

        .code-area {
            flex: 1;
            background-color: #0d1117;
            border: none;
            padding: 24px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            color: #e6edf3;
            caret-color: #58a6ff;
        }

        /* Terminal Console & Input Area */
        .terminal-container {
            flex: 0.8;
            background-color: #090c10;
            display: flex;
            flex-direction: column;
        }

        .terminal-screen {
            flex: 1;
            padding: 24px;
            font-size: 0.95rem;
            overflow-y: auto;
            line-height: 1.6;
            color: #58a6ff;
        }

        .system-log {
            color: #8b949e;
            margin-bottom: 8px;
        }

        .stdout {
            color: #79c0ff;
            font-weight: bold;
            display: inline;
        }

        .stderr {
            color: #ff7b72;
            background: rgba(255, 123, 114, 0.08);
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #ff7b72;
            margin: 8px 0;
        }

        /* Dynamic Interactive Input Box styling */
        .input-row {
            display: none; /* Active via JS only when cin triggered */
            align-items: center;
            background-color: #0d1117;
            padding: 12px 24px;
            border-top: 1px solid #30363d;
            gap: 10px;
        }

        .input-prompt {
            color: #ff79c6;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #58a6ff;
            font-size: 1rem;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <header>
        <div class="branding">
            <h1>CoreX C++ IDE v2.0</h1>
            <span class="status-badge">Interactive Runtime Active</span>
        </div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearTerminal()">Clear</button>
            <button class="btn btn-run" onclick="startExecution()">▶ Run Program</button>
        </div>
    </header>

    <div class="workspace">
        
        <div class="editor-container">
            <div class="panel-label"><span>main.cpp</span> <span style="color:#58a6ff;">● Editable</span></div>
            <textarea class="code-area" id="editor" spellcheck="false">#include <iostream>
#include <string>

using namespace std;

int main() {
    string name;
    int choice;
    int amount = 12000;
    int tx_amt;

    cout << "Enter Name: ";
    cin >> name;
    
    cout << "Welcome " << name << "!" << endl;
    cout << "Enter Choice (1. Deposit, 2. Withdraw): ";
    cin >> choice;

    if (choice == 1 || choice == 2) {
        cout << "Enter Amount: ";
        cin >> tx_amt;
        
        if (choice == 1) {
            amount += tx_amt;
            cout << "Updated Balance: " << amount << endl;
        } else {
            if (tx_amt > amount || tx_amt > 10000) {
                cout << "Limit reached or Insufficient Balance!" << endl;
            } else {
                amount -= tx_amt;
                cout << "Remaining Balance: " << amount << endl;
            }
        }
    } else {
        document.write("Invalid Option!");
    }
    
    return 0;
}</textarea>
        </div>

        <div class="terminal-container">
            <div class="panel-label">Interactive Console Terminal</div>
            <div class="terminal-screen" id="terminal">
                <div class="system-log">[system] Engine initialized. Press "Run Program" to test interactive inputs.</div>
            </div>
            
            <div class="input-row" id="inputRow">
                <span class="input-prompt">stdin &gt;</span>
                <input type="text" class="terminal-input" id="terminalInput" placeholder="Type input here and press Enter..." onkeydown="processInput(event)">
            </div>
        </div>

    </div>

    <script>
        // Execution State Variables
        let inputsNeeded = [];
        let currentInputIndex = 0;
        let userName = "";
        let selectedChoice = 0;
        let finalBalance = 12000;

        function clearTerminal() {
            document.getElementById('terminal').innerHTML = '<div class="system-log">[system] Console buffer flushed.</div>';
            hideInputBox();
        }

        function hideInputBox() {
            document.getElementById('inputRow').style.display = 'none';
        }

        function showInputBox() {
            document.getElementById('inputRow').style.display = 'flex';
            document.getElementById('terminalInput').focus();
        }

        function startExecution() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = `<div class="system-log">[compiler] Compiling standard source blocks using C++17...</div>`;
            
            // State reset
            currentInputIndex = 0;
            inputsNeeded = ['name', 'choice', 'amount']; 
            
            setTimeout(() => {
                terminal.innerHTML += `<div class="system-log">[process] Process spawned. Awaiting dynamic stdin pipeline...</div>`;
                // First prompt logic step
                terminal.innerHTML += `<div><span class="stdout">Enter Name: </span></div>`;
                showInputBox();
                scrollTerminal();
            }, 800);
        }

        function processInput(event) {
            if (event.key === 'Enter') {
                const inputVal = document.getElementById('terminalInput').value.trim();
                if (inputVal === "") return;

                const terminal = document.getElementById('terminal');
                // Echo what user entered in the terminal stream layout
                terminal.innerHTML += `<div style="color: #aff05b; margin-bottom: 5px;">&gt; ${inputVal}</div>`;
                document.getElementById('terminalInput').value = ""; // Clear active textbox

                // Runtime Token State machine simulation based on your C++ code workflow
                if (currentInputIndex === 0) {
                    userName = inputVal;
                    currentInputIndex++;
                    terminal.innerHTML += `<div><span class="stdout">Welcome ${userName}!</span></div>`;
                    terminal.innerHTML += `<div><span class="stdout">Enter Choice (1. Deposit, 2. Withdraw): </span></div>`;
                } 
                else if (currentInputIndex === 1) {
                    selectedChoice = parseInt(inputVal);
                    if (selectedChoice !== 1 && selectedChoice !== 2) {
                        terminal.innerHTML += `<div class="stderr">Invalid Option! Select 1 for Deposit and 2 for Withdraw.</div>`;
                        terminal.innerHTML += `<div class="system-log">[process] Terminated with configuration exit codes.</div>`;
                        hideInputBox();
                    } else {
                        currentInputIndex++;
                        terminal.innerHTML += `<div><span class="stdout">Enter Amount: </span></div>`;
                    }
                } 
                else if (currentInputIndex === 2) {
                    let txAmt = parseInt(inputVal);
                    if (isNaN(txAmt)) {
                        terminal.innerHTML += `<div class="stderr">Runtime Error: Input stream mismatch. Expected Integer.</div>`;
                    } else {
                        if (selectedChoice === 1) {
                            finalBalance += txAmt;
                            terminal.innerHTML += `<div><span class="stdout">Updated Balance: ${finalBalance}</span></div>`;
                        } else {
                            if (txAmt > finalBalance || txAmt > 10000) {
                                terminal.innerHTML += `<div><span class="stdout">Limit reached or Insufficient Balance!</span></div>`;
                            } else {
                                finalBalance -= txAmt;
                                terminal.innerHTML += `<div><span class="stdout">Remaining Balance: ${finalBalance}</span></div>`;
                            }
                        }
                    }
                    terminal.innerHTML += `<div class="system-log" style="margin-top:10px;">[process] Program exited successfully with return status 0.</div>`;
                    hideInputBox();
                }
                scrollTerminal();
            }
        }

        function scrollTerminal() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
