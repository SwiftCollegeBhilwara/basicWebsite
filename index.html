<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX - C++ Cloud IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Header */
        header {
            background-color: #161b22;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .branding h1 {
            font-size: 1.1rem;
            color: #58a6ff;
            font-weight: 600;
        }

        .lib-badge {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #8b949e;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-run {
            background-color: #238636;
            color: white;
        }

        .btn-run:hover {
            background-color: #2ea043;
            box-shadow: 0 0 8px rgba(46, 160, 67, 0.4);
        }

        .btn-clear {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .btn-clear:hover {
            background-color: #30363d;
        }

        /* Workspace Panels Layout */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 57px);
        }

        /* Editor Block */
        .editor-container {
            flex: 1.2;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
        }

        .panel-label {
            background-color: #161b22;
            padding: 6px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
        }

        .code-area {
            flex: 1;
            background-color: #0d1117;
            color: #ff79c6;
            border: none;
            padding: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            color: #f8f8f2;
        }

        /* Terminal Console Block */
        .terminal-container {
            flex: 0.8;
            background-color: #090d13;
            display: flex;
            flex-direction: column;
        }

        .terminal-screen {
            flex: 1;
            padding: 20px;
            font-size: 0.9rem;
            overflow-y: auto;
            line-height: 1.6;
        }

        .system-log {
            color: #8b949e;
            margin-bottom: 8px;
        }

        .stdout {
            color: #58a6ff;
            white-space: pre-wrap;
        }

        .stderr {
            color: #ff7b72;
            background: rgba(255, 123, 114, 0.1);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #ff7b72;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="branding">
            <h1>CoreX C++ Engine</h1>
            <span class="lib-badge">STL Loaded (v17)</span>
        </div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearTerminal()">Clear Console</button>
            <button class="btn btn-run" onclick="compileAndExecute()">▶ Run Code</button>
        </div>
    </header>

    <div class="workspace">
        
        <div class="editor-container">
            <div class="panel-label">main.cpp</div>
            <textarea class="code-area" id="editor" spellcheck="false">#include <iostream>
#include <vector>
#include <string>

using namespace std;

int main() {
    cout << "Hello, World!" << endl;
    cout << "MDSU BCA Compiler Simulation Active." << endl;
    
    vector<string> modules = {"STL", "IOSTREAM", "VECTOR"};
    cout << "Standard Engine Compiled Successfully." << endl;
    
    return 0;
}</textarea>
        </div>

        <div class="terminal-container">
            <div class="panel-label">Terminal / Compilation Output</div>
            <div class="terminal-screen" id="terminal">
                <div class="system-log">[system] CoreX Compiler Console initialized. Ready to execute code blueprints.</div>
            </div>
        </div>

    </div>

    <script>
        function clearTerminal() {
            document.getElementById('terminal').innerHTML = '<div class="system-log">[system] Console buffer cleared.</div>';
        }

        function compileAndExecute() {
            const code = document.getElementById('editor').value;
            const terminal = document.getElementById('terminal');
            
            // Append explicit run initialization log
            terminal.innerHTML += `<div class="system-log" style="margin-top:10px;">[compiler] g++ -std=c++17 main.cpp -o main...</div>`;
            
            setTimeout(() => {
                // Syntactical Verification Engine Simulation
                if (!code.includes('#include')) {
                    terminal.innerHTML += `<div class="stderr">Compilation Error: No library wrappers or preprocessor directives detected. Please add #include &lt;iostream&gt;</div>`;
                    scrollTerminal();
                    return;
                }
                
                if (!code.includes('main()')) {
                    terminal.innerHTML += `<div class="stderr">Linker Error: 'main' token function missing. Execution entry point not found.</div>`;
                    scrollTerminal();
                    return;
                }

                if (code.includes('cout') && !code.includes('std::') && !code.includes('using namespace std;')) {
                    terminal.innerHTML += `<div class="stderr">Compilation Error: 'cout' was not declared in this scope. Did you forget 'using namespace std;'?</div>`;
                    scrollTerminal();
                    return;
                }

                // Parse cout operations safely
                let outputBuffer = "";
                const matches = code.match(/cout\s*<<\s*["']([^"']*)["']/g);
                
                if (matches) {
                    matches.forEach(match => {
                        const str = match.match(/["']([^"']*)["']/)[1];
                        outputBuffer += str + "\n";
                    });
                } else {
                    outputBuffer = "Process terminated with exit code 0 (No stream output defined).";
                }

                terminal.innerHTML += `<div class="stdout">${outputBuffer}</div>`;
                terminal.innerHTML += `<div class="system-log">[process] Program exited successfully with execution parameters.</div>`;
                scrollTerminal();
            }, 600); // UI operational lag animation block
        }

        function scrollTerminal() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
