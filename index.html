<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX Pro - Lexical & Syntax C++ Compiler Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0e14;
            color: #cdcaa7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .branding h1 {
            font-size: 1.2rem;
            color: #58a6ff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-run { background-color: #238636; color: white; }
        .btn-run:hover { background-color: #2ea043; }
        .btn-clear { background-color: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d1117;
        }

        .panel-right {
            flex: 1;
            border-left: 1px solid #30363d;
            background-color: #090c10;
            display: flex;
            flex-direction: column;
        }

        .panel-label {
            background-color: #161b22;
            padding: 8px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }

        .code-area {
            flex: 1;
            background: transparent;
            border: none;
            padding: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e6edf3;
            outline: none;
            resize: none;
        }

        .console-screen {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .token-keyword { color: #ff79c6; }
        .token-identifier { color: #58a6ff; }
        .token-literal { color: #a5d6ff; }
        .system-log { color: #8b949e; margin-top: 5px; }
        .error-log { color: #ff7b72; background: rgba(255,123,114,0.1); padding: 8px; border-radius: 4px; margin-top: 5px;}
    </style>
</head>
<body>

    <header>
        <div class="branding">
            <h1>CoreX Production Compiler System</h1>
        </div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearConsole()">Clear Logs</button>
            <button class="btn btn-run" onclick="runLexicalAndSyntaxCompiler()">▶ Compile Code (GCC Hook)</button>
        </div>
    </header>

    <div class="workspace">
        <div class="panel">
            <div class="panel-label">Source Code Editor (main.cpp)</div>
            <textarea class="code-area" id="editor" spellcheck="false">#include <iostream>
using namespace std;

int main() {
    int amount = 12000;
    int tx_amt = 5000;
    amount -= tx_amt;
    return 0;
}</textarea>
        </div>

        <div class="panel-right">
            <div class="panel-label">Compiler Core Stream (Lexer/Parser Output)</div>
            <div class="console-screen" id="consoleOut">
                <div class="system-log">[System] Ready for lexical parsing analysis.</div>
            </div>
        </div>
    </div>

    <script>
        function clearConsole() {
            document.getElementById('consoleOut').innerHTML = '<div class="system-log">[System] Console pipeline cleared.</div>';
        }

        function runLexicalAndSyntaxCompiler() {
            const code = document.getElementById('editor').value;
            const consoleOut = document.getElementById('consoleOut');
            consoleOut.innerHTML = '<div class="system-log">[Phase 1] Starting Lexical Analysis (Tokenizing)...</div>';

            setTimeout(() => {
                // Bracket matching check (Syntax phase basic validation)
                const openBrackets = (code.match(/\{/g) || []).length;
                const closeBrackets = (code.match(/\}/g) || []).length;

                if (openBrackets !== closeBrackets) {
                    consoleOut.innerHTML += `<div class="error-log">Syntax Error: Unbalanced scoping operators. Bracket '{' count does not match '}'. Compilation Aborted.</div>`;
                    return;
                }

                // Token classification logic simulation loop
                const words = code.split(/\s+|\b/);
                let htmlOutput = "<div class='system-log'>[Phase 2] Generated Valid System Tokens Table:</div><table style='width:100%; margin: 10px 0;'>";
                
                const keywords = ['int', 'return', 'include', 'using', 'namespace', 'void', 'string', 'if', 'else', 'double'];
                
                words.forEach(word => {
                    word = word.trim();
                    if (!word) return;

                    if (keywords.includes(word)) {
                        htmlOutput += `<tr><td class='token-keyword'>[Keyword]</td><td>${word}</td></tr>`;
                    } else if (!isNaN(word)) {
                        htmlOutput += `<tr><td class='token-literal'>[Literal/Constant]</td><td>${word}</td></tr>`;
                    } else if (word.match(/^[a-zA-Z_][a-zA-Z0-9_]*$/)) {
                        htmlOutput += `<tr><td class='token-identifier'>[Identifier]</td><td>${word}</td></tr>`;
                    }
                });

                htmlOutput += "</table>";
                consoleOut.innerHTML += htmlOutput;
                consoleOut.innerHTML += `<div class="system-log" style="color: #5af78e;">[Success] Code optimization done. Output: Process exited smoothly with status (0).</div>`;
            }, 600);
        }
    </script>
</body>
</html>
