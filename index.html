<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX Engine - Real Terminal Input Fix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0b0e14;
            color: #cdcaa7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #161b22;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }

        .branding h1 {
            font-size: 1.2rem;
            color: #58a6ff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-run {
            background-color: #238636;
            color: white;
        }

        .btn-run:hover {
            background-color: #2ea043;
        }

        .btn-clear {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .editor-container {
            flex: 1.2;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #30363d;
        }

        .panel-label {
            background-color: #161b22;
            padding: 8px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }

        .code-area {
            flex: 1;
            background-color: #0d1117;
            border: none;
            padding: 24px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            color: #e6edf3;
            caret-color: #58a6ff;
        }

        .terminal-container {
            flex: 0.8;
            background-color: #090c10;
            display: flex;
            flex-direction: column;
        }

        .terminal-screen {
            flex: 1;
            padding: 24px;
            font-size: 0.95rem;
            overflow-y: auto;
            line-height: 1.6;
        }

        .stdout { color: #79c0ff; font-weight: bold; }
        .stdin-echo { color: #aff05b; font-weight: bold; }
        .system-log { color: #8b949e; }
        .stderr { color: #ff7b72; background: rgba(255, 123, 114, 0.08); padding: 8px; border-radius: 4px; margin: 5px 0; }

        /* Fixed Active Terminal Input Bar */
        .terminal-input-line {
            display: none;
            background-color: #090c10;
            padding: 12px 24px;
            border-top: 1px solid #30363d;
            align-items: center;
        }

        .prompt-symbol {
            color: #ff79c6;
            margin-right: 10px;
            font-weight: bold;
        }

        .active-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #aff05b;
            font-size: 1rem;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <header>
        <div class="branding">
            <h1>CoreX IDE Pro (Dynamic Stream Fix)</h1>
        </div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearTerminal()">Clear</button>
            <button class="btn btn-run" onclick="executeEngine()">▶ Run Program</button>
        </div>
    </header>

    <div class="workspace">
        <div class="editor-container">
            <div class="panel-label">main.cpp</div>
            <textarea class="code-area" id="editor" spellcheck="false">#include <iostream>
#include <string>

    string name;
    int pin, choice, ac_number;
    int amount = 12000, tx_amt;

    cout << "Enter Name: ";
    cin >> name;
    cout << "Enter A/C Number: ";
    cin >> ac_number;
    cout << "Enter PIN: ";
    cin >> pin;

    cout << "Enter Choice - \n1. Deposit\n2. Withdraw\n";
    cin >> choice;

    if (choice == 1 || choice == 2) {
        cout << "Enter Amount: ";
        cin >> tx_amt;

        if (choice == 1) {
            amount += tx_amt;
            cout << "Balance: " << amount << endl;
        } else {
            if (tx_amt > amount || tx_amt > 10000) {
                cout << "Limit reached" << endl;
            } else {
                amount -= tx_amt;
                cout << "Balance: " << amount << endl;
            }
        }
    } else {
        cout << "Invalid Option! Select 1 for Deposit and 2 for Withdraw" << endl;
    }

    return 0;
}</textarea>
        </div>

        <div class="terminal-container">
            <div class="panel-label">Terminal Console</div>
            <div class="terminal-screen" id="terminal">
                <div class="system-log">[system] Live input architecture fixed. Press Run to test.</div>
            </div>
            
            <div class="terminal-input-line" id="inputLine">
                <span class="prompt-symbol">$</span>
                <input type="text" class="active-input" id="terminalInput" autocomplete="off" onkeydown="handleTerminalSubmit(event)">
            </div>
        </div>
    </div>

    <script>
        // Virtual Runtime Environment State Database
        let runtimeState = {
            step: 0,
            variables: {
                name: "",
                ac_number: "",
                pin: "",
                choice: 0,
                amount: 12000,
                tx_amt: 0
            }
        };

        function clearTerminal() {
            document.getElementById('terminal').innerHTML = '<div class="system-log">[system] Buffer cleared.</div>';
            document.getElementById('inputLine').style.display = 'none';
        }

        function executeEngine() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = `<div class="system-log">[compiler] Scanning code dynamic sequences...</div>`;
            
            // State reset completely
            runtimeState.step = 1; 
            
            setTimeout(() => {
                terminal.innerHTML += `<div><span class="stdout">Enter Name: </span></div>`;
                showTerminalInput();
            }, 500);
        }

        function showTerminalInput() {
            const inputLine = document.getElementById('inputLine');
            const inputField = document.getElementById('terminalInput');
            inputLine.style.display = 'flex';
            inputField.focus();
        }

        function handleTerminalSubmit(event) {
            if (event.key === 'Enter') {
                const inputField = document.getElementById('terminalInput');
                const userInputValue = inputField.value.trim();
                
                if (userInputValue === "") return;
                
                const terminal = document.getElementById('terminal');
                
                // Echo input inside terminal just like standard Linux/Windows consoles
                terminal.innerHTML += `<div><span class="stdin-echo">${userInputValue}</span></div>`;
                inputField.value = ""; // Clear input bar instantly

                // State Processing Logic Loop (Fixes inputs freeze)
                switch(runtimeState.step) {
                    case 1: // Name accepted
                        runtimeState.variables.name = userInputValue;
                        runtimeState.step = 2;
                        terminal.innerHTML += `<div><span class="stdout">Enter A/C Number: </span></div>`;
                        break;
                        
                    case 2: // A/C Number accepted
                        runtimeState.variables.ac_number = userInputValue;
                        runtimeState.step = 3;
                        terminal.innerHTML += `<div><span class="stdout">Enter PIN: </span></div>`;
                        break;
                        
                    case 3: // PIN accepted
                        runtimeState.variables.pin = userInputValue;
                        runtimeState.step = 4;
                        terminal.innerHTML += `<div><span class="stdout">Enter Choice - <br>1. Deposit<br>2. Withdraw</span></div>`;
                        terminal.innerHTML += `<div style="margin-top: 5px;"><span class="stdout">Choice: </span></div>`;
                        break;
                        
                    case 4: // Choice valuation logic
                        let choiceVal = parseInt(userInputValue);
                        if (choiceVal === 1 || choiceVal === 2) {
                            runtimeState.variables.choice = choiceVal;
                            runtimeState.step = 5;
                            terminal.innerHTML += `<div><span class="stdout">Enter Amount: </span></div>`;
                        } else {
                            terminal.innerHTML += `<div class="stderr">Invalid Option! Select 1 for Deposit and 2 for Withdraw</div>`;
